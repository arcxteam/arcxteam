name: Gitanimals Cat Update

# ╔══════════════════════════════════════════════════════════════════╗
# ║  HOW TO DISABLE this workflow without deleting the file:        ║
# ║                                                                  ║
# ║  1. Change the "on:" block below to only:                       ║
# ║       on: [workflow_dispatch]                                    ║
# ║     -> workflow will not auto-run, manual trigger only.         ║
# ║                                                                  ║
# ║  2. Or disable via GitHub UI:                                   ║
# ║     Actions -> select this workflow -> ... -> Disable workflow  ║
# ║                                                                  ║
# ║  3. To hide the image from README only (without stopping job):  ║
# ║     Wrap the <a>...</a> gitanimals block in README with:        ║
# ║     <!-- and -->  (turn it into an HTML comment)                ║
# ╚══════════════════════════════════════════════════════════════════╝

on:
  schedule:
    - cron: "0 3 * * *" # Run daily 03:00 UTC — hapus/nonaktifkan baris ini untuk stop auto-run
  workflow_dispatch: # trigger manual tetap tersedia
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Gitanimals SVGs
        run: |
          mkdir -p assets
          # Lines mode — kucing & hewan berjalan berdasarkan kontribusi
          curl -sL "https://render.gitanimals.org/lines/arcxteam?with-cat=1&with-cat-ghost=1&with-little-chick=1&with-penguin=1&with-slime=1" \
            -o assets/gitanimals-lines.svg
          echo "=== Downloaded files ==="
          ls -lh assets/gitanimals-*.svg || true

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/gitanimals-lines.svg
          git commit -m "chore: update gitanimals renders [skip ci]" || echo "No changes to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
