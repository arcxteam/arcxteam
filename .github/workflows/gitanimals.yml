name: Gitanimals Cat Update

on:
  workflow_dispatch: # manual trigger only
  # --- TO ENABLE AUTO-RUN: uncomment the lines below ---
  # schedule:
  #   - cron: "0 3 * * *"  # daily at 03:00 UTC
  # push:
  #   branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Gitanimals SVG
        run: |
          mkdir -p assets
          curl -sL "https://render.gitanimals.org/lines/arcxteam?with-cat=1&with-cat-ghost=1&with-little-chick=1&with-penguin=1&with-slime=1" \
            -o assets/gitanimals-lines.svg

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/gitanimals-lines.svg
          git commit -m "chore: update gitanimals renders [skip ci]" || echo "No changes to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
