name: Gitanimals Cat Update

# ╔══════════════════════════════════════════════════════════════════╗
# ║  CARA NONAKTIFKAN workflow ini tanpa menghapus file:            ║
# ║                                                                  ║
# ║  1. Ubah blok "on:" di bawah menjadi hanya:                    ║
# ║       on: [workflow_dispatch]                                    ║
# ║     → workflow tidak akan auto-run, hanya bisa trigger manual.  ║
# ║                                                                  ║
# ║  2. Atau disable via GitHub UI:                                  ║
# ║     Actions → pilih workflow ini → ⋯ → Disable workflow         ║
# ║                                                                  ║
# ║  3. Untuk sembunyikan gambar di README saja (tanpa stop job):   ║
# ║     Bungkus blok <a>...</a> gitanimals di README dengan:        ║
# ║     <!-- dan -->  (jadikan HTML comment)                        ║
# ╚══════════════════════════════════════════════════════════════════╝

on:
  schedule:
    - cron: "0 3 * * *" # Run daily 03:00 UTC — hapus/nonaktifkan baris ini untuk stop auto-run
  workflow_dispatch: # trigger manual tetap tersedia
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Gitanimals SVGs
        run: |
          mkdir -p assets
          # Lines mode — kucing & hewan berjalan berdasarkan kontribusi
          curl -sL "https://render.gitanimals.org/lines/arcxteam?with-cat=1&with-cat-ghost=1&with-little-chick=1&with-penguin=1&with-slime=1" \
            -o assets/gitanimals-lines.svg
          echo "=== Downloaded files ==="
          ls -lh assets/gitanimals-*.svg || true

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/gitanimals-lines.svg
          git commit -m "chore: update gitanimals renders [skip ci]" || echo "No changes to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
